services:

  mysql:
    image: mariadb:10.11
    container_name: gts-mysql
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: growtechstack
      MARIADB_USER: gts
      MARIADB_PASSWORD: gts1234
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s
    networks:
      - gts-network

  kafka:
    image: apache/kafka:3.8.1
    container_name: gts-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - gts-network

  gts-ai-summary:
    build:
      context: ../gts-ai-summary-service
      dockerfile: Dockerfile
    container_name: gts-ai-summary
    ports:
      - "29998:29998"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AI_API_KEY: ${AI_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - gts-network
    restart: on-failure

  devfeed:
    build:
      context: ../devfeed
      dockerfile: Dockerfile
    container_name: gts-collector-service
    ports:
      - "29999:29999"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_NAME: growtechstack
      DB_USERNAME: gts
      DB_PASSWORD: gts1234
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - gts-network
    restart: on-failure

volumes:
  mysql-data:

networks:
  gts-network:
    driver: bridge
