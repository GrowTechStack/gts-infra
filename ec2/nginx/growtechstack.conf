server {
    server_name growtechstack.com www.growtechstack.com;

    # API 요청 → Gateway
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI (collector-service 경유)
    location /swagger-ui/ {
        proxy_pass http://localhost:29999/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OpenAPI Docs (collector-service 경유)
    location /v3/api-docs {
        proxy_pass http://localhost:29999/v3/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 나머지 → Vercel (React 프론트엔드)
    location / {
        proxy_pass https://gts-frontend.vercel.app;
        proxy_ssl_server_name on;
        proxy_set_header Host gts-frontend.vercel.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/growtechstack.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/growtechstack.com/privkey.pem;
}

server {
    server_name aiapi.growtechstack.com;

    location / {
        proxy_pass http://localhost:29998;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/growtechstack.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/growtechstack.com/privkey.pem;
}

server {
    if ($host = www.growtechstack.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = growtechstack.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name growtechstack.com www.growtechstack.com;
    return 404;
}

server {
    if ($host = aiapi.growtechstack.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name aiapi.growtechstack.com;
    return 404;
}
